<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Playlist</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: #0b0b0b;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

.spotify {
  width: 92%;
  max-width: 430px;
  min-height: 720px;
  background: linear-gradient(180deg, #1db954, #121212 35%);
  border-radius: 28px;
  padding: 25px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.6);
}

h1 {
  margin: 0;
  font-size: 28px;
}

.note {
  margin-top: 8px;
  font-size: 14px;
  color: #d6ffd6;
}

.search-box {
  margin-top: 25px;
}

input {
  width: 100%;
  padding: 15px 18px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 15px;
}

.song-list {
  margin-top: 18px;
  padding: 15px;
  background: rgba(255,255,255,0.08);
  border-radius: 18px;
  font-size: 14px;
  color: #ddd;
}

.song-list p {
  margin: 7px 0;
}

.error {
  margin-top: 18px;
  color: #ffb3b3;
  display: none;
  font-size: 14px;
}

.player {
  display: none;
  margin-top: 30px;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  min-height: 430px;
  background-size: cover;
  background-position: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

.player::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.25),
    rgba(0,0,0,0.92)
  );
}

.player-content {
  position: relative;
  z-index: 2;
  padding: 25px;
  min-height: 430px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.cover {
  width: 175px;
  height: 175px;
  margin: 35px auto 28px;
  border-radius: 18px;
  object-fit: cover;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

.song-title {
  font-size: 25px;
  font-weight: bold;
  margin-bottom: 5px;
}

.artist {
  color: #ccc;
  font-size: 14px;
  margin-bottom: 18px;
}

audio {
  display: none;
}

.custom-player {
  margin-top: 10px;
  padding: 14px;
  border-radius: 24px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(10px);
}

.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #ccc;
  margin-bottom: 8px;
}

.progress {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.25);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
}

#progressBar {
  width: 0%;
  height: 100%;
  background: white;
  border-radius: 20px;
}

.controls {
  margin-top: 18px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.play-btn {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: none;
  background: #1db954;
  color: white;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 8px 25px rgba(29,185,84,0.45);
}

.play-btn:active {
  transform: scale(0.94);
}
</style>
</head>

<body>

<div class="spotify">
  <h1>Search</h1>
  <div class="note">Search the song I secretly listed for you.</div>

  <div class="search-box">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="What do you want to listen to?"
      oninput="searchSong()"
    >
  </div>

  <div class="song-list">
    <b>Only 4 songs are available:</b>
    <p>1. Her</p>
    <p>2. Fantasy</p>
    <p>3. Ehu girl</p>
    <p>4. Fly Me To The Moon</p>
  </div>

  <div class="error" id="error">
    Song not found. Maybe search the one meant for you.
  </div>

  <div class="player" id="player">
    <div class="player-content">
      <img class="cover" id="cover" src="">

      <div class="song-title" id="songTitle"></div>
      <div class="artist" id="artist"></div>

      <audio id="audioPlayer">
        <source id="audioSource" src="" type="audio/mpeg">
      </audio>

      <div class="custom-player">
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>

        <div class="progress" onclick="seekAudio(event)">
          <div id="progressBar"></div>
        </div>

        <div class="controls">
          <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const songs = [
  {
    title: "Her",
    artist: "JVKE",
    cover: "p1.jpg",
    background: "p1.jpg",
    audio: "her.mp3"
  },
  {
    title: "Fantasy",
    artist: "Meiko Nakahara",
    cover: "p3.jpg",
    background: "p3.jpg",
    audio: "fantasy.mp3"
  },
  {
    title: "Ehu girl",
    artist: "Kolohe Kai",
    cover: "p4.jpg",
    background: "p4.jpg",
    audio: "Ehu.mp3"
  },
  {
    title: "Fly Me To The Moon",
    artist: "Frank Sinatra",
    cover: "moon.jpg",
    background: "moon.jpg",
    audio: "moon.mp3"
  }
];

const audioPlayer = document.getElementById("audioPlayer");
const audioSource = document.getElementById("audioSource");
const playBtn = document.getElementById("playBtn");
const progressBar = document.getElementById("progressBar");
const currentTimeText = document.getElementById("currentTime");
const durationText = document.getElementById("duration");

function searchSong() {
  const input = document.getElementById("searchInput").value.toLowerCase().trim();
  const player = document.getElementById("player");
  const error = document.getElementById("error");

  const song = songs.find(s => s.title.toLowerCase() === input);

  if (!input) {
    player.style.display = "none";
    error.style.display = "none";
    audioPlayer.pause();
    playBtn.textContent = "▶";
    return;
  }

  if (song) {
    player.style.display = "block";
    error.style.display = "none";

    player.style.backgroundImage = `url('${song.background}')`;

    document.getElementById("cover").src = song.cover;
    document.getElementById("songTitle").textContent = song.title;
    document.getElementById("artist").textContent = song.artist;

    audioPlayer.pause();
    playBtn.textContent = "▶";
    progressBar.style.width = "0%";
    currentTimeText.textContent = "0:00";
    durationText.textContent = "0:00";

    audioSource.src = song.audio;
    audioPlayer.load();
  } else {
    player.style.display = "none";
    error.style.display = "block";
    audioPlayer.pause();
    playBtn.textContent = "▶";
  }
}

function togglePlay() {
  if (audioPlayer.paused) {
    audioPlayer.play();
    playBtn.textContent = "❚❚";
  } else {
    audioPlayer.pause();
    playBtn.textContent = "▶";
  }
}

audioPlayer.addEventListener("loadedmetadata", () => {
  durationText.textContent = formatTime(audioPlayer.duration);
});

audioPlayer.addEventListener("timeupdate", () => {
  const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
  progressBar.style.width = progress + "%";
  currentTimeText.textContent = formatTime(audioPlayer.currentTime);
});

audioPlayer.addEventListener("ended", () => {
  playBtn.textContent = "▶";
  progressBar.style.width = "0%";
  currentTimeText.textContent = "0:00";
});

function seekAudio(event) {
  const progress = event.currentTarget;
  const clickX = event.offsetX;
  const width = progress.offsetWidth;

  audioPlayer.currentTime = (clickX / width) * audioPlayer.duration;
}

function formatTime(time) {
  if (isNaN(time)) return "0:00";

  const minutes = Math.floor(time / 60);
  const seconds = Math.floor(time % 60).toString().padStart(2, "0");

  return `${minutes}:${seconds}`;
}
</script>

</body>
</html>
